<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Farewell Countdown</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px rgba(255,183,77,0.2)} 50%{box-shadow:0 0 40px rgba(255,183,77,0.5)} }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
    .float { animation: float 4s ease-in-out infinite; }
    .fade-up { animation: fadeUp 0.8s ease-out both; }
    .fade-up-2 { animation: fadeUp 0.8s ease-out 0.2s both; }
    .fade-up-3 { animation: fadeUp 0.8s ease-out 0.4s both; }
    .fade-up-4 { animation: fadeUp 0.8s ease-out 0.6s both; }
    .shimmer-text {
      background: linear-gradient(90deg, #f0e6d3 30%, #ffb74d 50%, #f0e6d3 70%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }
    .countdown-card { animation: pulse-glow 3s ease-in-out infinite; }
    .star { position:absolute; width:3px; height:3px; border-radius:50%; background:#ffb74d; animation: twinkle 2s ease-in-out infinite; }
    body { box-sizing: border-box; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto relative" style="background: radial-gradient(ellipse at 20% 50%, #1a1a2e 0%, #0f0f1a 50%, #050510 100%); --bg-color:#0f0f1a; --surface-color:#1a1a3e; --text-color:#f0e6d3; --accent-color:#ffb74d; --secondary-color:#7c6f9b;">

   <!-- Stars -->
   <div id="stars" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

   <div class="relative z-10 flex flex-col items-center justify-center min-h-full px-4 py-10">

    <!-- Graduation Cap -->
    <div class="fade-up float text-6xl md:text-8xl mb-4">🎓</div>

    <!-- Batch -->
    <p id="batchText" class="fade-up-2 text-sm md:text-base tracking-[0.4em] uppercase mb-3"
       style="font-family:'DM Sans',sans-serif; color:#ffb74d;">Batch 2022-26</p>

    <!-- Title -->
    <h1 id="mainTitle" class="fade-up-2 text-4xl md:text-7xl font-black text-center mb-3 shimmer-text"
        style="font-family:'Playfair Display',serif;">Farewell</h1>

    <!-- Tagline -->
    <p id="tagline" class="fade-up-3 text-base md:text-xl text-center mb-2 max-w-lg"
       style="font-family:'DM Sans',sans-serif; color:#7c6f9b;">The moment we've been waiting for...</p>

    <!-- Date display -->
    <p class="fade-up-3 text-sm md:text-base mb-10"
       style="font-family:'DM Sans',sans-serif; color:#f0e6d3; opacity:0.6;">
      <i data-lucide="calendar" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"></i>
      April 16, 2026 · 2:00 PM IST
    </p>

    <!-- Countdown -->
    <div id="countdown" class="fade-up-4 flex flex-wrap justify-center gap-4 md:gap-6 mb-10">

      <div class="countdown-card flex flex-col items-center rounded-2xl px-5 py-4 md:px-8 md:py-6 min-w-[90px] md:min-w-[120px]"
           style="background:rgba(26,26,62,0.7); border:1px solid rgba(255,183,77,0.15); backdrop-filter:blur(10px);">
        <span id="days" class="text-4xl md:text-6xl font-black"
              style="font-family:'Playfair Display',serif; color:#ffb74d;">--</span>
        <span class="text-xs md:text-sm uppercase tracking-widest mt-1"
              style="font-family:'DM Sans',sans-serif; color:#7c6f9b;">Days</span>
      </div>

      <div class="countdown-card flex flex-col items-center rounded-2xl px-5 py-4 md:px-8 md:py-6 min-w-[90px] md:min-w-[120px]"
           style="background:rgba(26,26,62,0.7); border:1px solid rgba(255,183,77,0.15); backdrop-filter:blur(10px);">
        <span id="hours" class="text-4xl md:text-6xl font-black"
              style="font-family:'Playfair Display',serif; color:#ffb74d;">--</span>
        <span class="text-xs md:text-sm uppercase tracking-widest mt-1"
              style="font-family:'DM Sans',sans-serif; color:#7c6f9b;">Hours</span>
      </div>

      <div class="countdown-card flex flex-col items-center rounded-2xl px-5 py-4 md:px-8 md:py-6 min-w-[90px] md:min-w-[120px]"
           style="background:rgba(26,26,62,0.7); border:1px solid rgba(255,183,77,0.15); backdrop-filter:blur(10px);">
        <span id="minutes" class="text-4xl md:text-6xl font-black"
              style="font-family:'Playfair Display',serif; color:#ffb74d;">--</span>
        <span class="text-xs md:text-sm uppercase tracking-widest mt-1"
              style="font-family:'DM Sans',sans-serif; color:#7c6f9b;">Minutes</span>
      </div>

      <div class="countdown-card flex flex-col items-center rounded-2xl px-5 py-4 md:px-8 md:py-6 min-w-[90px] md:min-w-[120px]"
           style="background:rgba(26,26,62,0.7); border:1px solid rgba(255,183,77,0.15); backdrop-filter:blur(10px);">
        <span id="seconds" class="text-4xl md:text-6xl font-black"
              style="font-family:'Playfair Display',serif; color:#ffb74d;">--</span>
        <span class="text-xs md:text-sm uppercase tracking-widest mt-1"
              style="font-family:'DM Sans',sans-serif; color:#7c6f9b;">Seconds</span>
      </div>

    </div>

    <!-- Message -->
    <p id="eventMessage" class="fade-up-4 text-center text-sm md:text-base max-w-md"
       style="font-family:'DM Sans',sans-serif; color:#f0e6d3; opacity:0.5;">
      Four years of memories, one unforgettable farewell ✨
    </p>

   </div>
  </div>

  <script>
    // ── Stars ──────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      const size = (Math.random() * 2 + 1) + 'px';
      s.style.width = s.style.height = size;
      starsEl.appendChild(s);
    }

    // ── Countdown (IST = UTC+5:30) ─────────────────────────
    // '2026-04-15T12:00:00+05:30' locks the target to 12:00 PM IST
    // regardless of the viewer's device timezone.
    const targetTime = new Date('2026-04-16T14:00:00+05:30').getTime();

    function updateCountdown() {
      const now  = Date.now();
      const diff = targetTime - now;

      if (diff <= 0) {
        ['days','hours','minutes','seconds'].forEach(id =>
          document.getElementById(id).textContent = '00'
        );
        const msg = document.getElementById('eventMessage');
        msg.textContent = '🎉 The farewell is HERE! Cherish every moment!';
        msg.style.opacity = '1';
        msg.style.color   = '#ffb74d';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent    = String(days).padStart(2, '0');
      document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── Lucide icons ───────────────────────────────────────
    lucide.createIcons();
  </script>
 </body>
</html>
